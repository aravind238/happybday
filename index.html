<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HBD love</title>

<link rel="stylesheet" href="./file/default.css">
<script src="./file/jquery.min.js"></script>
<script src="./file/jscex.min.js"></script>
<script src="./file/jscex-parser.js"></script>
<script src="./file/jscex-jit.js"></script>
<script src="./file/jscex-builderbase.min.js"></script>
<script src="./file/jscex-async.min.js"></script>
<script src="./file/jscex-async-powerpack.min.js"></script>
<script src="./file/functions.js"></script>
<script src="./file/love.js"></script>

<script>
function playAudio() {
    var audio = document.getElementById("myAudio");
    audio.play().catch(() => {});
}
</script>
</head>

<body>
<div id="main">

<!-- 👇 Instruction text -->
<div style="text-align:center; color:white; font-size:18px;">
    Click anywhere to start music 🎵
</div>

<!-- ✅ FIXED AUDIO -->
<audio id="myAudio" loop>
    <source src="aud1.mp3?v=10" type="audio/mpeg">
</audio>

<div id="wrap">
    <div id="text">
        <div id="code">
            <span class="say">That blue T-shirt really suits you 💙</span><br>
            <span class="say">Looks calm, classy, and perfect… just like you ✨</span><br>
            <span class="say">Hope your day is filled with smiles 😊</span><br>
            <span class="say">Surprises 🎁</span><br>
            <span class="say">And all the happiness you deserve 💙</span><br>
        </div>
    </div>

    <div id="clock-box">
        <span id="clock">577 days 0 hours 0 minutes 0 seconds</span>
    </div>

    <canvas id="canvas" width="1100" height="680"></canvas>
</div>
</div>

<script>
(function() {
    var canvas = $('#canvas');

    if (!canvas[0].getContext) return;

    var width = canvas.width();
    var height = canvas.height();        
    canvas.attr("width", width);
    canvas.attr("height", height);

    var opts = {
        seed: { x: width/2-20, color: "rgb(190,26,37)", scale: 2 },
        branch: [[[535,680,570,250,500,200,30,100]]],
        bloom: { num: 700, width:1080, height:650 },
        footer: { width:1200, height:5, speed:10 }
    };

    var tree = new Tree(canvas[0], width, height, opts);
    var seed = tree.seed;
    var hold = 1;

    // ✅ play audio on first click
    canvas.one("click", function(e) {
        playAudio();
        hold = 0;
    });

    var seedAnimate = eval(Jscex.compile("async", function () {
        seed.draw();
        while (hold) { $await(Jscex.Async.sleep(10)); }
    }));

    var runAsync = eval(Jscex.compile("async", function () {
        $await(seedAnimate());
    }));

    runAsync().start();
})();
</script>

</body>
</html>
